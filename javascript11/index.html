<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./style.css">
</head>

<body>
    <header>
        <div class="logo">
            <h1>Workout trucker</h1>
        </div>
        <div class="frame">
            <div><span id="total">0</span>
                <p>Workouts</p>
            </div>
            <div><span id="completed">0</span>
                <p>Completed</p>
            </div>
            <div><span id="minutes">0</span>
                <p>Mins</p>
            </div>
        </div>
    </header>




    <div class="bar">
        <input type="text" id="search" placeholder="Search workouts">
        <select id="level">
            <option value="all">All level</option>
            <option value="begin">Beginner</option>

            <option value="ins">Intermediate</option>

            <option value="smill">Advanced</option>
        </select>



        <select id="sidebar">
            <option value="all">all categories</option>
            <option value="str">Strength</option>
            <option value="cardio">Cardio</option>

            <option value="flex">Flexibility</option>
        </select>

        <button id="addbtn">Add Workout</button>
    </div>

    <div class="list" id="list"></div>

    <div class="showBar" id="showBar">
        <div class="showbar-content">

            <label for="name">Workout Name</label>
            <input type="text" id="name" placeholder="Workout name">


            <label for="catgory">Category</label>


            <select id="catgory">
                <option value="Strength">Strength</option>
                <option value="Cardio">Cardio</option>
                <option value="Flexibility">Flexibility</option>
            </select>



            <label for="flevel">Difficulty</label>

            
            <select id="flevel">
                <option value="Beginner">Beginner</option>
                <option value="Intermediate">Intermediate</option>
                <option value="Advanced">Advanced</option>
            </select>

            <label for="duration">Duration mins</label>
            <input type="number" id="duration">

            <label for="date">Date</label>
            <input type="date" id="date">

            <label for="writer">Notes</label>
            <textarea id="writer"></textarea>
            <div class="showbar-actions">


                <button id="cancel">Cancel</button>
                <button id="save">Add workout</button>
            </div>
        </div>
    </div>


    <script src="./java.js"></script>
</body>

</html>
