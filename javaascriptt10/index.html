<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./style.css">
</head>

<body>



    <div class="header">
        <span>Product Inventory</span>
        <button id="addBtn">+ Add Product</button>
    </div>

    <div class="grid" id="grid"></div>

    <div class="modal-bg" id="modalBg">
        <div class="modal">
            <div class="modal-header">
                <h2 id="modalTitle">Add Product</h2>
                <button id="closeBtn">&#x2715;</button>
            </div>


            <div class="form-group">
                <label>Product Name</label>
                <input type="text" id="fName" placeholder="e.g. Wireless Headphones">
            </div>


            <div class="form-row">
                <div class="form-group">
                    <label>Category</label>
                    <input type="text" id="fCategory" placeholder="e.g. Electronics">
                </div>


                <div class="form-group">
                    <label>Price ($)</label>
                    <input type="number" id="fPrice" placeholder="0.00">
                </div>
            </div>


            <div class="form-row">
                <div class="form-group">
                    <label>Stock Count</label>
                    <input type="number" id="fStock" value="0">
                </div>
                <div class="form-group">
                    <label>Image URL</label>
                    <input type="text" id="fImage" placeholder="URL://">
                </div>
            </div>


            <div class="form-group">
                <label>Description</label>
                <textarea id="fDesc" placeholder="Short product description..."></textarea>
            </div>


            <div class="modal-footer">
                <button class="btn-cancel" id="cancelBtn">Cancel</button>
                <button class="btn-save" id="saveBtn">Add Product</button>
            </div>


        </div>
    </div>




    <script src="./java.js"></script>
</body>

</html>
